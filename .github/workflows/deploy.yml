name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image tags
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> "$GITHUB_ENV"
          echo "SHA_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}
            ${{ env.SHA_IMAGE }}

      - name: Create deploy directory on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT != '' && secrets.SERVER_PORT || '22' }}
          script_stop: true
          script: |
            mkdir -p "${{ secrets.SERVER_DEPLOY_DIR }}"

      - name: Upload docker-compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT != '' && secrets.SERVER_PORT || '22' }}
          source: "docker-compose.yml"
          target: "${{ secrets.SERVER_DEPLOY_DIR }}"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          APP_PORT: ${{ secrets.APP_PORT }}
          FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
          WEB_CONFIG_ENABLED: ${{ secrets.WEB_CONFIG_ENABLED }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_ACCOUNT_PRODUCT: ${{ secrets.KIS_ACCOUNT_PRODUCT }}
          KIS_SVR: ${{ secrets.KIS_SVR }}
          KIS_PAPER_APP_KEY: ${{ secrets.KIS_PAPER_APP_KEY }}
          KIS_PAPER_APP_SECRET: ${{ secrets.KIS_PAPER_APP_SECRET }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT != '' && secrets.SERVER_PORT || '22' }}
          script_stop: true
          envs: IMAGE_NAME,APP_PORT,FLASK_SECRET_KEY,WEB_CONFIG_ENABLED,KIS_APP_KEY,KIS_APP_SECRET,KIS_ACCOUNT_NO,KIS_ACCOUNT_PRODUCT,KIS_SVR,KIS_PAPER_APP_KEY,KIS_PAPER_APP_SECRET,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -eu
            APP_DIR="${{ secrets.SERVER_DEPLOY_DIR }}"
            APP_PORT="${APP_PORT:-8050}"
            WEB_CONFIG_ENABLED="${WEB_CONFIG_ENABLED:-false}"
            KIS_ACCOUNT_PRODUCT="${KIS_ACCOUNT_PRODUCT:-01}"
            KIS_SVR="${KIS_SVR:-prod}"

            mkdir -p "$APP_DIR/data/config" "$APP_DIR/data/tokens" "$APP_DIR/data/ohlcv"
            cd "$APP_DIR"

            cat > .env <<EOF
            IMAGE_NAME=$IMAGE_NAME
            APP_PORT=$APP_PORT
            FLASK_SECRET_KEY=$FLASK_SECRET_KEY
            WEB_CONFIG_ENABLED=$WEB_CONFIG_ENABLED
            KIS_APP_KEY=$KIS_APP_KEY
            KIS_APP_SECRET=$KIS_APP_SECRET
            KIS_ACCOUNT_NO=$KIS_ACCOUNT_NO
            KIS_ACCOUNT_PRODUCT=$KIS_ACCOUNT_PRODUCT
            KIS_SVR=$KIS_SVR
            KIS_PAPER_APP_KEY=$KIS_PAPER_APP_KEY
            KIS_PAPER_APP_SECRET=$KIS_PAPER_APP_SECRET
            EOF

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose pull web updater
            docker compose up -d web
